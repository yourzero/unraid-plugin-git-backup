name: Build and Release

# Trigger: push a tag like v2026.04.13
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build .txz package
        run: |
          cd source
          tar -cJf ../git-backup-${{ steps.version.outputs.VERSION }}.txz .
          cd ..
          ls -lh git-backup-${{ steps.version.outputs.VERSION }}.txz

      - name: Update version in .plg file
        run: |
          sed -i 's/<!ENTITY version   ".*">/<!ENTITY version   "${{ steps.version.outputs.VERSION }}">/' git-backup.plg
          cat git-backup.plg | head -10

      - name: Commit updated .plg version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add git-backup.plg
          git diff --cached --quiet || git commit -m "release: v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Git Backup v${{ steps.version.outputs.VERSION }}

            ### Install on Unraid
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/git-backup.plg
            ```

            Paste the URL above into **Plugins → Install Plugin** in the Unraid WebUI.
          files: git-backup-${{ steps.version.outputs.VERSION }}.txz
          generate_release_notes: true
